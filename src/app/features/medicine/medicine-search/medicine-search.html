<search
  class="flex min-w-100 justify-center items-baseline gap-4 pt-6 pb-2 border-y border-(--medz-tertiary-soft)"
>
  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Search the database</mat-label>
    <input
      matInput
      [value]="searchQuery()"
      (input)="onSearchInput($event)"
      placeholder="Search molecules, protocols, or shelf codes"
      aria-label="Search the medicine archive"
    />
  </mat-form-field>
  <button matButton="filled">
    <span class="uppercase">search</span>
  </button>
</search>

<div class="pl-4 sm:pl-6 lg:pl-8 grid grid-cols-4">
  <aside class="border-r border-(--medz-tertiary-soft) p-4">
    <h4 class="text-base text-(--medz-primary) uppercase font-bold mt-4 mb-8">filter criteria</h4>
    <h5 class="text-sm text-(--medz-on-surface-muted) uppercase font-bold mt-6">origin</h5>
    <mat-selection-list #origin>
      <mat-list-option [togglePosition]="'before'">Manufactured</mat-list-option>
      <mat-list-option [togglePosition]="'before'">Imported</mat-list-option>
    </mat-selection-list>
    <h5 class="text-sm text-(--medz-on-surface-muted) uppercase font-bold mt-6">status</h5>
    <mat-nav-list>
      <a mat-list-item href="" (click)="$event.preventDefault()" [activated]="true">Active</a>
      <a mat-list-item href="" (click)="$event.preventDefault()">Withdrawn</a>
      <a mat-list-item href="" (click)="$event.preventDefault()">Not renewed</a>
    </mat-nav-list>
    <h5 class="text-sm text-(--medz-on-surface-muted) uppercase font-bold mt-6">
      Laboratory holder
    </h5>
    <mat-selection-list #laboratoryHolder>
      <mat-list-option [togglePosition]="'before'">Manufactured</mat-list-option>
      <mat-list-option [togglePosition]="'before'">Imported</mat-list-option>
    </mat-selection-list>
  </aside>
  <section class="col-span-3 m-0">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

      <!-- Position Column -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>No.</th>
        <td mat-cell *matCellDef="let element">{{ element.position }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="weight">
        <th mat-header-cell *matHeaderCellDef>Weight</th>
        <td mat-cell *matCellDef="let element">{{ element.weight }}</td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="symbol">
        <th mat-header-cell *matHeaderCellDef>Symbol</th>
        <td mat-cell *matCellDef="let element">{{ element.symbol }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator
      [length]="100"
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 25, 100]"
      aria-label="Select page"
    >
    </mat-paginator>
  </section>
</div>
